<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartDoc AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="card">
    <h1>SmartDoc AI</h1>
    <p class="subtitle">Azure Document Intelligence</p>

    <input type="text" id="endpoint" placeholder="Endpoint">
    <input type="text" id="key" placeholder="API Key">

    <label class="upload">
      Upload File
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png">
    </label>

    <div class="divider">OR</div>

    <input type="text" id="urlInput" placeholder="Paste URL">

    <button onclick="analyze()">Analyze</button>
  </div>

  <div class="dashboard">

    <!-- KEYWORDS -->
    <div class="ai-box">
      <h3>🔑 Important Keywords</h3>
      <p id="keywords">No keywords yet...</p>
    </div>

    <!-- SUMMARY -->
    <div class="ai-box">
      <h3>📄 Summary</h3>
      <p id="summary">No summary yet...</p>
    </div>

    <!-- OUTPUT -->
    <div class="output">
      <pre id="result">✨ Results will appear here...</pre>
    </div>

    <div class="actions">
      <button onclick="copyText()">Copy</button>
      <button onclick="downloadText()">Download</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
