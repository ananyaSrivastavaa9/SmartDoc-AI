<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartDoc AI</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div class="card">
    <h1>SmartDoc AI</h1>
    <p class="subtitle">Azure Document Intelligence</p>

    <input type="text" id="endpoint" placeholder="Endpoint">
    <input type="text" id="key" placeholder="API Key">

    <label class="upload">
      Upload File
      <input type="file" id="fileInput" accept=".pdf,.jpg,.jpeg,.png">
    </label>

    <div class="divider">OR</div>

    <input type="text" id="urlInput" placeholder="Paste Image/PDF URL">

    <button onclick="analyze()">Analyze</button>
  </div>

  <!-- RIGHT PANEL -->
  <div class="dashboard">

    <!-- PREVIEW -->
    <div class="preview">
      <img id="imgPreview" class="hidden"/>
      <iframe id="pdfPreview" class="hidden"></iframe>
    </div>

    <!-- STATS -->
    <div class="stats">
      <div class="box"><h3 id="pages">0</h3><p>Pages</p></div>
      <div class="box"><h3 id="words">0</h3><p>Words</p></div>
      <div class="box"><h3 id="lines">0</h3><p>Lines</p></div>
    </div>

    <!-- OUTPUT -->
    <div class="output">
      <div id="loader" class="loader hidden"></div>
      <pre id="result">✨ Results will appear here...</pre>
    </div>

    <!-- AI SUMMARY -->
    <div class="ai-box">
      <h3>🤖 AI Summary</h3>
      <p id="summary">No summary yet...</p>
    </div>

    <!-- CHAT -->
    <div class="chat">
      <input type="text" id="question" placeholder="Ask about document...">
      <button onclick="askQuestion()">Ask</button>
      <p id="answer"></p>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button onclick="copyText()">Copy</button>
      <button onclick="downloadText()">Download</button>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
